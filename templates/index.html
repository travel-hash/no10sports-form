<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No.10 Sports</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
}

/* FULL SCREEN CENTER */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* BIG FORM BOX */
.box{
    background:#111;
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:500px;   /* 🔥 BIGGER */
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* LOGO BIG */
.logo{
    width:180px;
    margin-bottom:20px;
}

/* TITLE BIG */
h2{
    font-size:26px;
    margin-bottom:20px;
}

/* INPUT BIG */
input{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}

/* BUTTON BIG */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

/* SUBMIT */
.submit-btn{
    background:green;
    color:white;
    font-weight:bold;
}

/* POPUP */
.popup{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
}

/* POPUP BOX BIG */
.popup-box{
    background:#111;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    text-align:center;
}

/* SOCIAL BUTTONS */
.insta, .youtube{
    font-size:16px;
    margin:10px 0;
}

.insta{
    background:#E1306C;
    color:white;
}

.youtube{
    background:#FF0000;
    color:white;
}

/* CONTINUE */
.continue{
    background:green;
    margin-top:15px;
    font-weight:bold;
}

/* THANK PAGE */
.thank{
    display:none;
    text-align:center;
    padding:30px;
}

/* THANK LOGO */
.thank img{
    width:160px;
    margin-bottom:20px;
}

/* BIG ICONS */
.icons i{
    font-size:36px;
    margin:15px;
}

/* 📱 MOBILE BOOST */
@media (max-width:600px){

    .box{
        padding:30px;
        max-width:95%;
    }

    .logo{
        width:140px;
    }

    h2{
        font-size:22px;
    }

    input{
        font-size:16px;
        padding:14px;
    }

    button{
        font-size:16px;
        padding:14px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="box" id="formBox">

<img src="/static/logo.png" class="logo">

<h2>Registration Form</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email ID">

<button class="submit-btn" onclick="openPopup()">Submit</button>

</div>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<h3>Follow & Subscribe First</h3>

<button class="insta" onclick="window.open('https://www.instagram.com/no.10sports/')">
<i class="fa-brands fa-instagram"></i> Follow on Instagram
</button>

<button class="youtube" onclick="window.open('https://www.youtube.com/@no.10sports')">
<i class="fa-brands fa-youtube"></i> Subscribe on YouTube
</button>

<br>

<input type="checkbox" id="check"> I have completed both steps

<button class="continue" id="btn" onclick="submitForm()">Continue</button>

</div>
</div>

<div class="thank" id="thank">

<img src="/static/logo.png">

<h1>Thank You</h1>

<p>Your registration has been successfully submitted</p>

<br>

<div class="icons">
<a href="https://www.instagram.com/no.10sports/" target="_blank">
<i class="fa-brands fa-instagram" style="color:#E1306C;"></i>
</a>

<a href="https://www.youtube.com/@no.10sports" target="_blank">
<i class="fa-brands fa-youtube" style="color:#FF0000;"></i>
</a>

<a href="https://www.facebook.com/no10sportss" target="_blank">
<i class="fa-brands fa-facebook" style="color:#1877F2;"></i>
</a>

<a href="https://www.linkedin.com/company/110479937" target="_blank">
<i class="fa-brands fa-linkedin" style="color:#0A66C2;"></i>
</a>
</div>

</div>

<script>

function openPopup(){
    popup.style.display="flex";
}

function submitForm(){

    if(!check.checked){
        alert("Please complete follow & subscribe first");
        return;
    }

    btn.innerText="Processing...";
    btn.disabled=true;

    fetch("/submit",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:name.value,
            phone:phone.value,
            email:email.value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status=="success"){
            popup.style.display="none";
            formBox.style.display="none";
            thank.style.display="block";
        }
        btn.innerText="Continue";
        btn.disabled=false;
    })
    .catch(()=>{
        alert("Something went wrong.");
        btn.innerText="Continue";
        btn.disabled=false;
    });
}

</script>

</body>
</html>

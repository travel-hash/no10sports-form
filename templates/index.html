<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No.10 Sports</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
}

/* CENTER */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* FORM BOX */
.box{
    background:#111;
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:500px;
    text-align:center;
}

/* LOGO */
.logo{
    width:180px;
    margin-bottom:20px;
}

/* TITLE */
h2{
    font-size:26px;
}

/* INPUT */
input{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

/* SUBMIT */
.submit-btn{
    background:green;
    color:white;
    font-weight:bold;
}

/* POPUP */
.popup{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
}

/* POPUP BOX */
.popup-box{
    background:#111;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
}

/* SOCIAL */
.insta{
    background:#E1306C;
    color:white;
    margin:10px 0;
}

.youtube{
    background:#FF0000;
    color:white;
    margin:10px 0;
}

/* CONTINUE */
.continue{
    background:green;
    margin-top:15px;
}

/* THANK */
.thank{
    display:none;
    text-align:center;
    padding:30px;
}

/* ICONS */
.icons i{
    font-size:36px;
    margin:15px;
}

/* MOBILE */
@media (max-width:600px){
    .box{
        padding:25px;
    }
    .logo{
        width:140px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="box" id="formBox">

<img src="/static/logo.png" class="logo">

<h2>Registration Form</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email ID">

<button class="submit-btn" onclick="openPopup()">Submit</button>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Follow & Subscribe First</h3>

<button class="insta" onclick="window.open('https://www.instagram.com/no.10sports/')">
Follow on Instagram
</button>

<button class="youtube" onclick="window.open('https://www.youtube.com/@no.10sports')">
Subscribe on YouTube
</button>

<br>

<input type="checkbox" id="check"> I have completed both steps

<button class="continue" id="btn" onclick="submitForm()">Continue</button>

</div>
</div>

<!-- THANK YOU -->
<div class="thank" id="thank">

<img src="/static/logo.png">

<h1>Thank You</h1>

<p>Your registration has been submitted</p>

<div class="icons">
<a href="https://www.instagram.com/no.10sports/" target="_blank">
<i class="fa-brands fa-instagram" style="color:#E1306C;"></i>
</a>

<a href="https://www.youtube.com/@no.10sports" target="_blank">
<i class="fa-brands fa-youtube" style="color:#FF0000;"></i>
</a>
</div>

</div>

<script>

function openPopup(){
    document.getElementById("popup").style.display = "flex";
}

function submitForm(){

    if(!document.getElementById("check").checked){
        alert("Please complete steps");
        return;
    }

    let btn = document.getElementById("btn");
    btn.innerText = "Processing...";
    btn.disabled = true;

    fetch("/submit",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){
            document.getElementById("popup").style.display = "none";
            document.getElementById("formBox").style.display = "none";
            document.getElementById("thank").style.display = "block";
        } else {
            alert("Submission failed");
        }

        btn.innerText = "Continue";
        btn.disabled = false;
    })
    .catch(() => {
        alert("Server error");
        btn.innerText = "Continue";
        btn.disabled = false;
    });
}

</script>

</body>
</html>

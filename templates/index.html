<!DOCTYPE html>
<html>
<head>
<title>No.10 Sports</title>

<!-- ✅ IMPORTANT for mobile view -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Bigger form */
.box{
    background:#111;
    padding:40px;
    border-radius:16px;
    width:90%;
    max-width:450px;
    text-align:center;
}

/* Bigger logo */
.logo{
    width:180px;
    margin-bottom:20px;
}

/* Bigger inputs */
input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

/* Bigger buttons */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

.submit-btn{
    background:green;
    color:white;
}

/* Popup */
.popup{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#111;
    padding:30px;
    border-radius:16px;
    width:90%;
    max-width:350px;
    text-align:center;
}

.insta{
    background:#E1306C;
    color:white;
    margin:10px 0;
}

.youtube{
    background:#FF0000;
    color:white;
    margin:10px 0;
}

.continue{
    background:green;
    margin-top:12px;
}

.error{
    color:red;
    font-size:12px;
    text-align:left;
    display:none;
}

/* Thank you screen */
.thank{
    display:none;
    text-align:center;
}

.thank img{
    width:180px;
    margin-bottom:20px;
}

/* Bigger icons */
.icons i{
    font-size:32px;
    margin:15px;
    transition:0.3s;
}

.icons i:hover{
    transform:scale(1.2);
}
</style>
</head>

<body>

<div class="box" id="formBox">

<img src="/static/logo.png" class="logo">

<h2>Registration Form</h2>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">
<div class="error" id="phoneErr">Phone already registered</div>

<input id="email" placeholder="Email ID">
<div class="error" id="emailErr">Email already registered</div>

<button class="submit-btn" onclick="openPopup()">Submit</button>

</div>

<!-- Popup -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Follow & Subscribe First</h3>

<button class="insta" onclick="window.open('https://www.instagram.com/no.10sports/')">
<i class="fa-brands fa-instagram"></i> Follow on Instagram
</button>

<button class="youtube" onclick="window.open('https://www.youtube.com/@no.10sports')">
<i class="fa-brands fa-youtube"></i> Subscribe on YouTube
</button>

<br><br>

<input type="checkbox" id="check"> I have completed both steps

<button class="continue" id="btn" onclick="submitForm()">Continue</button>

</div>
</div>

<!-- Thank you -->
<div class="thank" id="thank">

<img src="/static/logo.png">

<h1>Thank You</h1>
<p>Your registration has been successfully submitted</p>

<div class="icons">
<a href="https://www.instagram.com/no.10sports/" target="_blank">
<i class="fa-brands fa-instagram" style="color:#E1306C;"></i>
</a>

<a href="https://www.youtube.com/@no.10sports" target="_blank">
<i class="fa-brands fa-youtube" style="color:#FF0000;"></i>
</a>

<a href="https://www.facebook.com/no10sportss" target="_blank">
<i class="fa-brands fa-facebook" style="color:#1877F2;"></i>
</a>

<a href="https://www.linkedin.com/company/110479937" target="_blank">
<i class="fa-brands fa-linkedin" style="color:#0A66C2;"></i>
</a>
</div>

</div>

<script>

function openPopup(){
    document.getElementById("popup").style.display="flex";
}

function submitForm(){

    if(!document.getElementById("check").checked){
        alert("Please complete follow & subscribe first");
        return;
    }

    let btn = document.getElementById("btn");
    btn.innerText = "Processing...";
    btn.disabled = true;

    fetch("/submit", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){
            document.getElementById("popup").style.display = "none";
            document.getElementById("formBox").style.display = "none";
            document.getElementById("thank").style.display = "block";
        } else {
            alert("Error submitting form");
        }

        btn.innerText = "Continue";
        btn.disabled = false;
    })
    .catch(() => {
        alert("Server error");
        btn.innerText = "Continue";
        btn.disabled = false;
    });
}

</script>

</body>
</html>
